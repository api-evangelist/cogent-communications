specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Cogent Communications
providerId: cogent-communications
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Internet
  - Network
description: 'FOCUS-aligned FinOps for Cogent Communications: contract-based network services (Internet,
  Ethernet, Colocation, Wavelengths) priced via sales rather than public consumption-metered APIs.'
sources:
  - https://www.cogentco.com/en/products-and-services
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Cogent Communications, Inc.
serviceCategory: Networking
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Cogent Communications
  ServiceCategory: Networking
  ProviderName: Cogent Communications
  PublisherName: Cogent Communications, Inc.
  InvoiceIssuerName: Cogent Communications, Inc.
  BillingCurrency: USD
meters:
  - name: dedicated_internet_access
    unit: month
    aggregation: sum
    dimensions:
      - port_speed
      - location
  - name: ip_transit_bandwidth
    unit: Mbps
    aggregation: max
    dimensions:
      - market
      - commit_tier
  - name: colocation_space
    unit: rack-month
    aggregation: sum
    dimensions:
      - data_center
  - name: optical_wavelengths
    unit: month
    aggregation: sum
    dimensions:
      - circuit_speed
      - route
principles:
  - name: Visibility
    description: Reconcile Cogent invoices against circuit IDs and port speeds; pull SNMP/utilization
      data from edge routers to compare contracted bandwidth versus consumed.
  - name: Allocation
    description: Tag each circuit/wavelength/colo footprint to the consuming business unit, site, or product.
  - name: Optimization
    description: Right-size committed bandwidth; consolidate wavelengths where utilization is low; renegotiate
      multi-circuit contracts at renewal.
  - name: Accountability
    description: Network engineering owns circuit utilization; finance owns multi-year commitment decisions
      and renewal dates.
notes: No public API/usage-meter pricing; meters above represent invoice-line abstractions.
maintainers:
