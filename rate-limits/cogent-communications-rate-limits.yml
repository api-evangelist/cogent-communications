description: Cogent Communications does not publish public API rate limits. Any API surface is gated behind
  the customer portal; throttling and quota policy is governed by contract rather than a public docs page.
sources:
  - https://www.cogentco.com/en/products-and-services
notes: No public rate-limit documentation available. Limits below are placeholders pending discovery of
  a published developer reference.
responseCodes:
  throttled: 429
limits:
  - name: Customer portal API (undocumented)
    scope: account
    metric: varies
    limit: see vendor documentation (gated)
policies:
  - name: Backoff
    description: Use exponential backoff with jitter on 429/503 responses; honor Retry-After when returned.
  - name: Contract-governed
    description: Practical limits are governed by the customer's network service contract, not a published
      API tier.
